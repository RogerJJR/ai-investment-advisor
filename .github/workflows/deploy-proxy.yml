name: Deploy Cloud Run proxy

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/deploy-proxy.yml'
  workflow_dispatch:
    inputs:
      region:
        description: 'Cloud Run region'
        default: 'asia-east1'
        required: false

concurrency:
  group: cloud-run-proxy
  cancel-in-progress: false

jobs:
  deploy:
    name: gcloud run deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Show identity
        run: |
          gcloud auth list
          gcloud config get-value project || true

      - name: Deploy to Cloud Run
        env:
          REGION: ${{ github.event.inputs.region || 'asia-east1' }}
          PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          gcloud run deploy ai-advisor-proxy \
            --source ./server \
            --project "$PROJECT" \
            --region "$REGION" \
            --allow-unauthenticated \
            --cpu 1 \
            --memory 256Mi \
            --max-instances 10 \
            --min-instances 0 \
            --timeout 30s \
            --quiet

      - name: Ensure public access (allUsers invoker)
        continue-on-error: true
        env:
          REGION: ${{ github.event.inputs.region || 'asia-east1' }}
          PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          set +e
          gcloud run services add-iam-policy-binding ai-advisor-proxy \
            --member='allUsers' \
            --role='roles/run.invoker' \
            --region "$REGION" \
            --project "$PROJECT" \
            --quiet
          rc=$?
          if [ $rc -ne 0 ]; then
            echo "::warning title=allUsers bind failed::Could not grant public access. This is usually caused by a Google Workspace Org Policy (iam.allowedPolicyMemberDomains) blocking allUsers. The service is deployed but will return 403 for unauthenticated requests. See SETUP.md troubleshooting."
          fi

      - name: Print service URL
        env:
          REGION: ${{ github.event.inputs.region || 'asia-east1' }}
          PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          URL=$(gcloud run services describe ai-advisor-proxy \
            --region "$REGION" \
            --project "$PROJECT" \
            --format='value(status.url)')
          echo "Service URL: $URL"
          echo "::notice title=Cloud Run URL::$URL"

      - name: Revision status
        continue-on-error: true
        env:
          REGION: ${{ github.event.inputs.region || 'asia-east1' }}
          PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          echo "── Latest revisions ─────────────────────────────"
          gcloud run revisions list \
            --service ai-advisor-proxy \
            --region "$REGION" \
            --project "$PROJECT" \
            --limit 3 \
            --format='table(metadata.name, status.conditions[0].type, status.conditions[0].status, status.conditions[0].message)' || true

          echo
          echo "── Service status ───────────────────────────────"
          gcloud run services describe ai-advisor-proxy \
            --region "$REGION" \
            --project "$PROJECT" \
            --format='yaml(status.conditions, status.traffic, spec.template.spec.containers[0].image, spec.template.spec.containers[0].ports)' || true

      - name: Smoke test /healthz
        id: smoke
        continue-on-error: true
        env:
          REGION: ${{ github.event.inputs.region || 'asia-east1' }}
          PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          URL=$(gcloud run services describe ai-advisor-proxy \
            --region "$REGION" \
            --project "$PROJECT" \
            --format='value(status.url)')
          echo "Probing $URL/healthz …"
          # Probe unauthenticated (what the browser will do)
          HTTP=$(curl -sS -o /tmp/body -w '%{http_code}' "$URL/healthz" || echo 000)
          echo "Unauth status: $HTTP"
          head -c 500 /tmp/body || true; echo
          if [ "$HTTP" = "200" ]; then
            echo "::notice title=Public access OK::$URL is publicly reachable"
            echo "result=ok" >> "$GITHUB_OUTPUT"
          else
            # Fallback: probe with identity token (proves the service itself works)
            TOKEN=$(gcloud auth print-identity-token)
            HTTP2=$(curl -sS -H "Authorization: Bearer $TOKEN" -o /tmp/body2 -w '%{http_code}' "$URL/healthz" || echo 000)
            echo "Auth'd status: $HTTP2"
            head -c 500 /tmp/body2 || true; echo
            if [ "$HTTP2" = "200" ]; then
              echo "::warning title=Public access blocked::Service is healthy but requires authentication. Org policy likely blocks allUsers — see SETUP.md."
              echo "result=auth-only" >> "$GITHUB_OUTPUT"
            else
              echo "::warning title=Service unhealthy::/healthz returned $HTTP2 even with auth — container likely failed to start. Logs printed below."
              echo "result=broken" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Dump Cloud Run container logs (if smoke test failed)
        if: steps.smoke.outputs.result == 'broken' || steps.smoke.outputs.result == ''
        continue-on-error: true
        env:
          REGION: ${{ github.event.inputs.region || 'asia-east1' }}
          PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          echo "── Last 100 container log entries ──────────────"
          gcloud logging read \
            "resource.type=cloud_run_revision AND resource.labels.service_name=ai-advisor-proxy AND resource.labels.location=$REGION" \
            --limit 100 \
            --project "$PROJECT" \
            --format='value(timestamp, severity, textPayload)' \
            --order=desc || true

      - name: Fail if service is broken
        if: steps.smoke.outputs.result == 'broken'
        run: |
          echo "::error title=Deploy failed::Container does not respond on /healthz. See logs above."
          exit 1


name: Deploy Firebase Hosting

on:
  push:
    branches: [main]
    paths-ignore:
      - 'server/**'
      - 'narrative-regimes/**'
      - '*.pptx'
      - '*.zip'
      - 'README.md'
      - 'SETUP.md'
      - 'DEPLOY.md'
      - '.github/workflows/deploy-proxy.yml'
  workflow_dispatch:

concurrency:
  group: firebase-hosting
  cancel-in-progress: true

jobs:
  deploy:
    name: firebase deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Discover Cloud Run proxy URL and patch index.html
        env:
          REGION: asia-east1
          PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          set -e
          URL=$(gcloud run services describe ai-advisor-proxy \
            --region "$REGION" \
            --project "$PROJECT" \
            --format='value(status.url)' 2>/dev/null || true)
          if [ -n "$URL" ]; then
            echo "Patching <meta proxy-base> → $URL"
            sed -i "s|<meta name=\"proxy-base\" content=\"[^\"]*\"/>|<meta name=\"proxy-base\" content=\"$URL\"/>|" index.html
            grep -n proxy-base index.html || true
          else
            echo "::warning title=Proxy not deployed::Cloud Run service 'ai-advisor-proxy' not found in $REGION. Hosting will deploy without proxy-base; API calls will fall back to public CORS proxies."
          fi

      - name: Deploy to Firebase Hosting (live channel)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.GCP_SA_KEY }}
          projectId: ${{ secrets.GCP_PROJECT_ID }}
          channelId: live
